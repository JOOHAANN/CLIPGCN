# CLIPGCN tri-modal contrastive training config for 2s/1s windowed data.
# The current CLIPGCN/ETRI source has 55 valid classes, so 5 unseen classes
# yields a 50/5 zero-shot split. Paths are relative to this file.

runtime:
  device: cuda:1
  seed: 20260616
  amp: true
  no_show: true

data:
  train:
    data_dir: ./data/contrastive_windowed_zsl_splits/50_5
    prefix: seen
    mmap: true

  val:
    data_dir: ./data/contrastive_windowed_zsl_splits/50_5
    prefix: val_seen
    mmap: true

  validation_split:
    fraction: 0.1
    seed: 20260616

  text:
    xlsx: ./ntu55_global_descriptions.xlsx
    id_column: ID
    text_column: global_description
    label_offset: 1
    prompt_template: "{global_description}"
    batch_size: 128
    cache_output: ./work_dir/clip_text_action_embeddings.pt

  dataloader:
    batch_size: 128
    num_workers: 16
    train_shuffle: true
    val_shuffle: false
    pin_memory: true
    drop_last: true

model:
  text_encoder:
    name: ViT-B/32
    download_root: null

train:
  epochs: 240
  val_interval: 1
  grad_clip_norm: 1.0
  optimizer:
    name: AdamW
    lr: 0.0001
    weight_decay: 0.0001

outputs:
  work_dir: ./work_dir/clipgcn_windowed_50_5
  auto_run_dir: true
  run_name: null
  best_model: ./work_dir/clipgcn_windowed_50_5/best_model.pth
  last_model: ./work_dir/clipgcn_windowed_50_5/last_model.pth
  history: ./work_dir/clipgcn_windowed_50_5/history.json
  train_curve: ./work_dir/clipgcn_windowed_50_5/train_curve.png
  test_results: ./work_dir/clipgcn_windowed_50_5/unseen_test_results.json
